server {
    listen 80;

    # ── Static frontend files ─────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # SPA fallback: any path that doesn't match a real file is served as
        # index.html so React Router can handle client-side routing.
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # All requests starting with /api/ are forwarded to the backend container.
    # "backend" is the Docker Compose service name — Docker's internal DNS
    # resolves it to the backend container's IP automatically.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow streaming / SSE if needed in future
        proxy_buffering    off;
    }
}
